version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mediaflow
      POSTGRES_PASSWORD: mediaflow_secret
      POSTGRES_DB: mediaflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediaflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgresql://mediaflow:mediaflow_secret@db:5432/mediaflow
      SESSION_SECRET: change-me-in-production-use-a-long-random-string
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - api_uploads:/app/artifacts/api-server/uploads

  platform:
    build:
      context: .
      dockerfile: Dockerfile.platform
      args:
        VITE_API_URL: http://localhost:8080
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data:
  api_uploads:
