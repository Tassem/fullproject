version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${PGUSER:-mediaflow}
      POSTGRES_PASSWORD: ${PGPASSWORD:?Set PGPASSWORD in .env}
      POSTGRES_DB: ${PGDATABASE:-mediaflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediaflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgresql://${PGUSER:-mediaflow}:${PGPASSWORD:?Set PGPASSWORD in .env}@db:5432/${PGDATABASE:-mediaflow}
      SESSION_SECRET: ${SESSION_SECRET:?Set SESSION_SECRET in .env}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@mediaflow.com}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    ports:
      - "8087:8080"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - api_uploads:/app/artifacts/api-server/uploads

  platform:
    build:
      context: .
      dockerfile: Dockerfile.platform
      args:
        VITE_API_URL: http://localhost:8087
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:
  api_uploads:
