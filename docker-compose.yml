version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PGDATABASE:-mediaflow}
      POSTGRES_USER: ${PGUSER:-mediaflow}
      POSTGRES_PASSWORD: ${PGPASSWORD:-mediaflow_secret}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-mediaflow} -d ${PGDATABASE:-mediaflow}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - mediaflow

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${PGUSER:-mediaflow}:${PGPASSWORD:-mediaflow_secret}@db:5432/${PGDATABASE:-mediaflow}
    networks:
      - mediaflow
    restart: on-failure

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgres://${PGUSER:-mediaflow}:${PGPASSWORD:-mediaflow_secret}@db:5432/${PGDATABASE:-mediaflow}
      SESSION_SECRET: ${SESSION_SECRET:-change_this_secret_in_production}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8086:8080"
    volumes:
      - uploads_data:/app/artifacts/api-server/uploads
    networks:
      - mediaflow

  platform:
    build:
      context: .
      dockerfile: Dockerfile.platform
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8085:80"
    networks:
      - mediaflow

volumes:
  db_data:
  uploads_data:

networks:
  mediaflow:
    driver: bridge
